<div class="question-card">
  <p>{{ question().question }}</p>

  <!-- add better placeholder / example value -->
  <app-editable-field
    [value]="currentValue()"
    [placeholder]="question().placeholder || 'Enter value...'"
    (valueChange)="currentValue.set($event)"
    [isEditable]="true"
    [isActive]="true"
  />
  <!-- ✓ Answered
(empty = ignored) -->
</div>
