<div class="add-entity">
  <header class="add-entity__header">
    <h2>Add something new</h2>
    <mat-icon (click)="onClose()" svgIcon="HL-navigationClose" />
    <hr class="divider" />
  </header>

  @for (step of STEP_ORDER; track step) {
    @if (step === currentStep()) {
      <app-entity-section [title]="STEP_LABELS[step]">
        @switch (step) {
          @case (AddEntitySteps.CORE_INFO) {
            <!-- <app-core-info-form /> -->
          }

          @case (AddEntitySteps.TAGS) {
            <app-tag-selector
              (tagsChange)="onTagChange($event)"
              [selectedTags]="currentTags()"
            />
          }

          @case (AddEntitySteps.NOTES) {
            <app-editable-field [type]="'textarea'" />
          }
          @default {
            <div class="add-entity__questions">
              @for (rel of STEP_RELATIONSHIPS[step]; track rel) {
                <app-relationship-question-card [type]="rel" />
              }
            </div>
          }
        }
      </app-entity-section>
    }
  }
  <div class="add-entity__actions">
    <button (click)="prevStep()" class="add-entity__btn">
      <mat-icon svgIcon="HL-navigationArrowLeft" />
    </button>

    <button (click)="nextStep()" class="add-entity__btn">
      <mat-icon svgIcon="HL-navigationArrowRight" />
    </button>
  </div>
</div>
